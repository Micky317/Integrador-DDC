services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb_ddc
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123456
      - DOCKER_INFLUXDB_INIT_ORG=pasitos_firmes
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
    networks:
      - ddc_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana_ddc
    ports:
      - "3001:3000" # Usamos 3001 para evitar conflictos comunes
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - influxdb
    networks:
      - ddc_network

volumes:
  influxdb_data:
  grafana_data:

networks:
  ddc_network:
    driver: bridge
